name: Deploy - CodeRaider despliegue

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Desplegar a producción
    runs-on: ubuntu-latest

    steps:
      - name: Checkout del repositorio
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependencias y ejecutar tests
        run: |
          npm install
          npm test

      - name: Desplegar aplicación
        run: |
          echo "Iniciando despliegue de aplicación CodeRaider v $(node -p \"require('./package.json').version\")"
          echo "Sistema desplegado correctamente"
          echo "URL: https://streamflow.example.com"